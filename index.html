<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏐 Beach Volley Torneo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #6b3410; }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,220,80,0.3); border-radius: 2px; }
    button { font-family: 'Trebuchet MS', sans-serif; }
    input { font-family: 'Trebuchet MS', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    const INITIAL_TEAMS = [
      { id: 1, name: "I di...Sperati",           logo: "", color: "#e74c3c", members: ["Casagrande Lorenza","Paterno Ivo","Purin Silvia","Paterno Mara"] },
      { id: 2, name: "Monzarella",                logo: "", color: "#f39c12", members: ["Lorenzo Rigo","Simone Sittoni Wassermann","Giacomo Gaiardo","Davide Ballin"] },
      { id: 3, name: "Cretino Basket",            logo: "", color: "#2ecc71", members: [] },
      { id: 4, name: "Associazione a Delinquere", logo: "", color: "#a855f7", members: [] },
      { id: 5, name: "New York Knicks",           logo: "", color: "#38bdf8", members: ["Luca Gasperetti"] },
      { id: 6, name: "Super Chicche",             logo: "", color: "#f472b6", members: ["Alessandra Konecni","Chiara Volpe","Angelica Moser","Anna Martinelli","Kati Stefani","Elisa Franzinelli"] },
    ];

    function buildMatches(teams) {
      const ms = [];
      let id = 1;
      for (let i = 0; i < teams.length; i++)
        for (let j = i + 1; j < teams.length; j++)
          ms.push({ id: id++, home: teams[i].id, away: teams[j].id,
                    s1h:"", s1a:"", s2h:"", s2a:"", played: false });
      return ms;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function matchResult(m) {
      const [s1h,s1a,s2h,s2a] = [m.s1h,m.s1a,m.s2h,m.s2a].map(Number);
      if ([s1h,s1a,s2h,s2a].some(isNaN)) return null;
      return {
        sH: (s1h>s1a?1:0)+(s2h>s2a?1:0),
        sA: (s1a>s1h?1:0)+(s2a>s2h?1:0),
      };
    }

    function standings(matches, teams) {
      const st = {};
      teams.forEach(t => { st[t.id]={id:t.id,G:0,V:0,P:0,SV:0,SP:0,Pts:0}; });
      matches.forEach(m => {
        if (!m.played) return;
        const r = matchResult(m); if (!r) return;
        st[m.home].G++; st[m.away].G++;
        st[m.home].SV+=r.sH; st[m.home].SP+=r.sA;
        st[m.away].SV+=r.sA; st[m.away].SP+=r.sH;
        if (r.sH>r.sA) { st[m.home].V++; st[m.home].Pts+=3; st[m.away].P++; st[m.away].Pts+=1; }
        else if (r.sA>r.sH) { st[m.away].V++; st[m.away].Pts+=3; st[m.home].P++; st[m.home].Pts+=1; }
        else { st[m.home].Pts+=2; st[m.away].Pts+=2; }
      });
      return Object.values(st).sort((a,b)=>b.Pts-a.Pts||(b.SV-b.SP)-(a.SV-a.SP));
    }

    function probabilities(odds, teams) {
      let tot = 0;
      const imp = {};
      teams.forEach(t => {
        const q = parseFloat(odds[t.id]);
        imp[t.id] = (q>0) ? 1/q : 0;
        tot += imp[t.id];
      });
      return teams
        .map(t => ({ id: t.id, prob: tot>0 ? (imp[t.id]/tot)*100 : 0 }))
        .sort((a,b)=>b.prob-a.prob);
    }

    /* ── small reusable pieces ── */
    function Logo({ logo, name, color, size=36 }) {
      const [err, setErr] = useState(false);
      if (logo && !err)
        return <img src={logo} alt={name} onError={()=>setErr(true)}
                 style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",
                         border:`2px solid ${color}`,flexShrink:0}} />;
      return (
        <div style={{width:size,height:size,borderRadius:"50%",background:`${color}44`,
                     border:`2px solid ${color}`,display:"flex",alignItems:"center",
                     justifyContent:"center",fontSize:Math.round(size*.38),color,
                     fontWeight:900,flexShrink:0,userSelect:"none"}}>
          {name.charAt(0).toUpperCase()}
        </div>
      );
    }

    function NumInput({ value, onChange, placeholder, style={} }) {
      return <input type="number" min="0" max="99" value={value}
               onChange={e=>onChange(e.target.value)} placeholder={placeholder}
               style={{textAlign:"center",background:"rgba(0,0,0,0.65)",
                       border:"2px solid rgba(255,200,100,0.4)",borderRadius:8,
                       color:"#fff",fontWeight:900,outline:"none",...style}} />;
    }

    /* ═══════════════════════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════════════════════ */
    function App() {

      /* ── persisted state ── */
      const load = (key, fallback) => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):fallback; } catch{return fallback;} };

      const [teams,   setTeams]   = useState(()=>load('bv_teams',   INITIAL_TEAMS));
      const [matches, setMatches] = useState(()=>load('bv_matches', buildMatches(INITIAL_TEAMS)));
      const [odds,    setOdds]    = useState(()=>load('bv_odds',    {}));

      useEffect(()=>{ try{localStorage.setItem('bv_teams',   JSON.stringify(teams));}   catch{} }, [teams]);
      useEffect(()=>{ try{localStorage.setItem('bv_matches', JSON.stringify(matches));} catch{} }, [matches]);
      useEffect(()=>{ try{localStorage.setItem('bv_odds',    JSON.stringify(odds));}    catch{} }, [odds]);

      /* ── UI state ── */
      const [tab,       setTab]       = useState("calendario");
      const [openMatch, setOpenMatch] = useState(null);
      const [openTeam,  setOpenTeam]  = useState(null);
      const [editLogo,  setEditLogo]  = useState(null);
      const [logoVal,   setLogoVal]   = useState("");
      const [editMbr,   setEditMbr]   = useState(null);   // {teamId,idx}
      const [mbrVal,    setMbrVal]    = useState("");

      const byId = useCallback(id=>teams.find(t=>t.id===id), [teams]);

      /* ── match helpers ── */
      const randomize = ()=> setMatches(prev=>shuffle(prev).map((m,i)=>({...m,id:i+1})));

      const setScore = (mid, field, val) =>
        setMatches(prev=>prev.map(m=>{
          if(m.id!==mid) return m;
          const u={...m,[field]:val};
          u.played=[u.s1h,u.s1a,u.s2h,u.s2a].every(v=>v!==""&&!isNaN(Number(v)));
          return u;
        }));

      /* ── logo helpers ── */
      const saveLogo = teamId => {
        setTeams(prev=>prev.map(t=>t.id===teamId?{...t,logo:logoVal.trim()}:t));
        setEditLogo(null); setLogoVal("");
      };

      /* ── member helpers ── */
      const saveMbr = (teamId, idx) => {
        setTeams(prev=>prev.map(t=>{
          if(t.id!==teamId) return t;
          const members=[...t.members]; members[idx]=mbrVal.trim()||"";
          return {...t,members};
        }));
        setEditMbr(null);
      };
      const addMbr = teamId =>
        setTeams(prev=>prev.map(t=>t.id===teamId?{...t,members:[...t.members,""]}:t));
      const delMbr = (teamId,idx) =>
        setTeams(prev=>prev.map(t=>t.id!==teamId?t:{...t,members:t.members.filter((_,i)=>i!==idx)}));

      /* ── reset ── */
      const reset = ()=>{
        if(!window.confirm("Resettare tutto il torneo?")) return;
        setTeams(INITIAL_TEAMS); setMatches(buildMatches(INITIAL_TEAMS)); setOdds({});
        localStorage.clear();
      };

      /* ── derived data ── */
      const table  = standings(matches, teams);
      const probs  = probabilities(odds, teams);
      const played = matches.filter(m=>m.played).length;

      /* ── style helpers ── */
      const card = (ex={})=>({
        background:"rgba(0,0,0,0.58)",
        border:"1.5px solid rgba(255,200,100,0.22)",
        borderRadius:14, ...ex
      });
      const btn = (bg,color="#fff",ex={})=>({
        padding:"7px 13px", background:bg, border:"none",
        borderRadius:20, color, fontWeight:800, fontSize:12,
        cursor:"pointer", ...ex
      });

      /* ── TABS ── */
      const TABS=[["calendario","📅 Partite"],["classifica","🏆 Classifica"],["squadre","👥 Squadre"],["scommesse","🎲 Scommesse"]];

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#8b3a12 0%,#b5651d 30%,#c8882a 55%,#9a5015 80%,#6b2f0e 100%)",fontFamily:"'Trebuchet MS',sans-serif",color:"#fff"}}>

          {/* ── HEADER ── */}
          <div style={{background:"linear-gradient(180deg,rgba(0,55,135,0.97) 0%,rgba(0,100,200,0.88) 100%)",padding:"22px 20px 18px",textAlign:"center",borderBottom:"4px solid rgba(255,220,80,0.7)"}}>
            <div style={{fontSize:11,letterSpacing:5,color:"#ffe066",textTransform:"uppercase"}}>🏖️ Torneo</div>
            <div style={{fontSize:26,fontWeight:900,letterSpacing:1,textShadow:"0 2px 10px rgba(0,0,0,0.5)"}}>BEACH VOLLEY 🏐</div>
            <div style={{fontSize:12,color:"#ffe066",fontStyle:"italic",marginTop:2}}>Girone All'Italiana · 6 Squadre · 15 Partite</div>
            <div style={{maxWidth:280,margin:"12px auto 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.55)",marginBottom:4}}>
                <span>{played} giocate</span><span>{matches.length-played} rimaste</span>
              </div>
              <div style={{height:6,background:"rgba(255,255,255,0.18)",borderRadius:3}}>
                <div style={{height:"100%",width:`${(played/matches.length)*100}%`,background:"linear-gradient(90deg,#ffe066,#ff9500)",borderRadius:3,transition:"width .5s"}}/>
              </div>
            </div>
          </div>

          {/* ── FORMAT STRIP ── */}
          <div style={{background:"rgba(0,0,0,0.55)",padding:"8px 12px",display:"flex",justifyContent:"center",gap:18,flexWrap:"wrap"}}>
            {[["⏱️ Set 1","5 min"],["🔄 Pausa","2 min"],["⏱️ Set 2","5 min"],["📋 Totale","~15 min"]].map(([l,v])=>(
              <div key={l} style={{textAlign:"center",fontSize:12}}>
                <div style={{color:"#ffe066",fontWeight:700}}>{l}</div>
                <div style={{color:"rgba(255,255,255,0.65)"}}>{v}</div>
              </div>
            ))}
          </div>

          {/* ── TABS ── */}
          <div style={{display:"flex",justifyContent:"center",gap:6,padding:"12px 10px 0",flexWrap:"wrap"}}>
            {TABS.map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)}
                style={{...btn(tab===key?"#ffe066":"rgba(0,0,0,0.45)",tab===key?"#333":"#fff"),
                        border:`2px solid ${tab===key?"#ffe066":"rgba(255,255,255,0.2)"}`,
                        borderRadius:20,transition:"all .2s"}}>
                {label}
              </button>
            ))}
          </div>

          {/* ── CONTENT ── */}
          <div style={{maxWidth:640,margin:"0 auto",padding:"14px 12px 70px"}}>

            {/* ══ CALENDARIO ══ */}
            {tab==="calendario" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>Tocca una partita per i punteggi</div>
                  <button onClick={randomize} style={{...btn("linear-gradient(135deg,#ffe066,#ff9500)","#333")}}>🔀 Randomizza</button>
                </div>

                {matches.map((m,idx)=>{
                  const H=byId(m.home), A=byId(m.away);
                  const r=m.played?matchResult(m):null;
                  const open=openMatch===m.id;
                  return (
                    <div key={m.id} style={{...card({marginBottom:9,overflow:"hidden",
                      borderColor:m.played?"rgba(80,230,120,0.45)":"rgba(255,200,100,0.22)"})}}>

                      {/* row */}
                      <div onClick={()=>setOpenMatch(open?null:m.id)}
                        style={{padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                        <span style={{background:"rgba(255,220,80,0.22)",color:"#ffe066",borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:800,flexShrink:0}}>#{idx+1}</span>

                        {/* home */}
                        <div style={{flex:1,display:"flex",alignItems:"center",gap:7,justifyContent:"flex-end",minWidth:0}}>
                          <span style={{fontSize:12,fontWeight:800,color:H.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{H.name}</span>
                          <Logo logo={H.logo} name={H.name} color={H.color} size={30}/>
                        </div>

                        {/* score */}
                        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                          {r ? (
                            <>
                              <span style={{background:r.sH>r.sA?"rgba(80,210,100,0.4)":"rgba(255,70,70,0.3)",borderRadius:6,padding:"3px 10px",fontWeight:900,color:r.sH>r.sA?"#6eff9a":"#ff8080",fontSize:18}}>{r.sH}</span>
                              <span style={{color:"rgba(255,255,255,0.25)",fontWeight:900}}>-</span>
                              <span style={{background:r.sA>r.sH?"rgba(80,210,100,0.4)":"rgba(255,70,70,0.3)",borderRadius:6,padding:"3px 10px",fontWeight:900,color:r.sA>r.sH?"#6eff9a":"#ff8080",fontSize:18}}>{r.sA}</span>
                            </>
                          ) : <span style={{color:"rgba(255,255,255,0.18)",fontSize:16,padding:"0 6px"}}>🆚</span>}
                        </div>

                        {/* away */}
                        <div style={{flex:1,display:"flex",alignItems:"center",gap:7,minWidth:0}}>
                          <Logo logo={A.logo} name={A.name} color={A.color} size={30}/>
                          <span style={{fontSize:12,fontWeight:800,color:A.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{A.name}</span>
                        </div>

                        <span style={{color:"rgba(255,255,255,0.28)",fontSize:12,flexShrink:0}}>{open?"▲":"▼"}</span>
                      </div>

                      {/* expanded */}
                      {open && (
                        <div style={{padding:"4px 14px 14px",borderTop:"1px solid rgba(255,255,255,0.1)"}}>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
                            {[{label:"⏱️ Set 1  (5 min)",fH:"s1h",fA:"s1a"},{label:"🔄 Set 2  (cambio campo)",fH:"s2h",fA:"s2a"}].map(({label,fH,fA})=>(
                              <div key={label} style={{background:"rgba(0,0,0,0.45)",borderRadius:10,padding:"10px 12px"}}>
                                <div style={{fontSize:10,color:"#ffe066",fontWeight:700,marginBottom:8,textAlign:"center"}}>{label}</div>
                                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                                  <div style={{textAlign:"center"}}>
                                    <div style={{fontSize:9,color:H.color,marginBottom:3,fontWeight:700,overflow:"hidden",maxWidth:58,textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{H.name.split(" ")[0]}</div>
                                    <NumInput value={m[fH]} onChange={v=>setScore(m.id,fH,v)} style={{width:46,fontSize:22,padding:"5px 0"}}/>
                                  </div>
                                  <span style={{color:"rgba(255,255,255,0.2)"}}>·</span>
                                  <div style={{textAlign:"center"}}>
                                    <div style={{fontSize:9,color:A.color,marginBottom:3,fontWeight:700,overflow:"hidden",maxWidth:58,textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{A.name.split(" ")[0]}</div>
                                    <NumInput value={m[fA]} onChange={v=>setScore(m.id,fA,v)} style={{width:46,fontSize:22,padding:"5px 0"}}/>
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                          {m.played&&r&&(
                            <div style={{marginTop:10,textAlign:"center",fontSize:13,fontWeight:800,color:r.sH===r.sA?"#ffe066":"#6eff9a"}}>
                              {r.sH===r.sA?"🤝 Pareggio 1-1":`🏐 Vince ${r.sH>r.sA?H.name:A.name}!`}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ══ CLASSIFICA ══ */}
            {tab==="classifica" && (
              <div>
                <div style={{...card({overflow:"hidden"})}}>
                  <div style={{display:"grid",gridTemplateColumns:"26px 36px 1fr 26px 26px 26px 34px 30px",gap:2,padding:"10px 12px",background:"rgba(255,220,80,0.18)",fontSize:10,fontWeight:800,letterSpacing:1,textTransform:"uppercase",color:"#ffe066"}}>
                    <div>#</div><div/>  <div>Squadra</div>
                    <div style={{textAlign:"center"}}>G</div><div style={{textAlign:"center"}}>V</div><div style={{textAlign:"center"}}>P</div>
                    <div style={{textAlign:"center"}}>Set</div><div style={{textAlign:"center"}}>Pt</div>
                  </div>
                  {table.map((s,idx)=>{
                    const t=byId(s.id);
                    const medal=idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":`${idx+1}`;
                    return (
                      <div key={s.id} style={{display:"grid",gridTemplateColumns:"26px 36px 1fr 26px 26px 26px 34px 30px",gap:2,padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,0.1)",background:idx===0?"rgba(255,215,0,0.1)":"transparent",alignItems:"center"}}>
                        <div style={{fontWeight:900,fontSize:idx<3?14:12,color:idx===0?"#ffd700":idx===1?"#c0c0c0":idx===2?"#cd7f32":"#777"}}>{medal}</div>
                        <Logo logo={t.logo} name={t.name} color={t.color} size={28}/>
                        <div style={{fontSize:12,fontWeight:700,color:t.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>
                        {[s.G,s.V,s.P].map((v,i)=><div key={i} style={{textAlign:"center",fontSize:12,color:"rgba(255,255,255,0.8)"}}>{v}</div>)}
                        <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.45)"}}>{s.SV}-{s.SP}</div>
                        <div style={{textAlign:"center",fontSize:16,fontWeight:900,color:"#ffe066"}}>{s.Pts}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:10,padding:"12px 14px",...card({fontSize:11,color:"rgba(255,255,255,0.45)",lineHeight:1.8})}}>
                  <b style={{color:"#ffe066"}}>Punti:</b> Vittoria 2-0 = <b style={{color:"#fff"}}>3pt</b> · Pareggio 1-1 = <b style={{color:"#fff"}}>2pt</b> a testa · Sconfitta 0-2 = <b style={{color:"#fff"}}>1pt</b>
                </div>
              </div>
            )}

            {/* ══ SQUADRE ══ */}
            {tab==="squadre" && (
              <div>
                {teams.map(team=>(
                  <div key={team.id} style={{...card({marginBottom:10,overflow:"hidden",borderColor:openTeam===team.id?team.color:"rgba(255,200,100,0.22)"})}}>

                    {/* team header */}
                    <div onClick={()=>setOpenTeam(openTeam===team.id?null:team.id)}
                      style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                      <Logo logo={team.logo} name={team.name} color={team.color} size={44}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:15,fontWeight:800,color:team.color}}>{team.name}</div>
                        <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginTop:2}}>
                          {team.members.filter(m=>m&&m!=="TBD").length} giocatori
                        </div>
                      </div>
                      <div style={{color:"rgba(255,255,255,0.3)"}}>{openTeam===team.id?"▲":"▼"}</div>
                    </div>

                    {openTeam===team.id && (
                      <div style={{padding:"0 16px 16px",borderTop:`1px solid ${team.color}55`}}>

                        {/* ── LOGO ── */}
                        <div style={{marginTop:14,marginBottom:16,padding:"12px",background:"rgba(0,0,0,0.35)",borderRadius:10}}>
                          <div style={{fontSize:11,color:"#ffe066",fontWeight:700,marginBottom:10}}>🖼️ Logo squadra</div>
                          <div style={{display:"flex",alignItems:"center",gap:12}}>
                            <Logo logo={team.logo} name={team.name} color={team.color} size={52}/>
                            <div style={{flex:1}}>
                              {editLogo===team.id ? (
                                <div>
                                  <input type="text" value={logoVal} onChange={e=>setLogoVal(e.target.value)}
                                    placeholder="https://sito.com/logo.png" autoFocus
                                    style={{width:"100%",background:"rgba(0,0,0,0.65)",border:`2px solid ${team.color}88`,borderRadius:8,color:"#fff",fontSize:12,padding:"8px 10px",outline:"none",marginBottom:8}}/>
                                  <div style={{display:"flex",gap:8}}>
                                    <button onClick={()=>saveLogo(team.id)} style={{...btn(team.color),flex:1,padding:"7px",borderRadius:8}}>✓ Salva</button>
                                    <button onClick={()=>{setEditLogo(null);setLogoVal("");}} style={{...btn("rgba(255,70,70,0.35)"),padding:"7px 12px",borderRadius:8}}>✕</button>
                                  </div>
                                </div>
                              ) : (
                                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                                  <button onClick={()=>{setEditLogo(team.id);setLogoVal(team.logo);}}
                                    style={{padding:"7px 14px",background:"rgba(255,220,80,0.18)",border:`1px solid rgba(255,220,80,0.4)`,borderRadius:8,color:"#ffe066",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                                    {team.logo?"✏️ Cambia URL":"➕ Aggiungi URL"}
                                  </button>
                                  {team.logo&&<button onClick={()=>setTeams(prev=>prev.map(t=>t.id===team.id?{...t,logo:""}:t))}
                                    style={{padding:"7px 10px",background:"rgba(255,70,70,0.18)",border:"1px solid rgba(255,70,70,0.35)",borderRadius:8,color:"#ff8080",fontWeight:700,fontSize:11,cursor:"pointer"}}>🗑️</button>}
                                </div>
                              )}
                            </div>
                          </div>
                        </div>

                        {/* ── MEMBRI ── */}
                        <div style={{padding:"12px",background:"rgba(0,0,0,0.35)",borderRadius:10}}>
                          <div style={{fontSize:11,color:"#ffe066",fontWeight:700,marginBottom:10}}>👥 Giocatori</div>

                          {team.members.length===0 && (
                            <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",fontStyle:"italic",paddingBottom:8}}>Nessun giocatore ancora</div>
                          )}

                          {team.members.map((mbr,i)=>(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                              <span style={{color:team.color,fontSize:10,flexShrink:0}}>●</span>

                              {editMbr&&editMbr.teamId===team.id&&editMbr.idx===i ? (
                                <>
                                  <input type="text" value={mbrVal} onChange={e=>setMbrVal(e.target.value)}
                                    onKeyDown={e=>{if(e.key==="Enter")saveMbr(team.id,i);if(e.key==="Escape")setEditMbr(null);}}
                                    autoFocus
                                    style={{flex:1,background:"rgba(0,0,0,0.6)",border:`1.5px solid ${team.color}`,borderRadius:7,color:"#fff",fontSize:13,padding:"5px 8px",outline:"none"}}/>
                                  <button onClick={()=>saveMbr(team.id,i)} style={{padding:"4px 10px",background:team.color,border:"none",borderRadius:6,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>✓</button>
                                  <button onClick={()=>setEditMbr(null)} style={{padding:"4px 7px",background:"rgba(255,70,70,0.3)",border:"none",borderRadius:6,color:"#fff",fontSize:11,cursor:"pointer"}}>✕</button>
                                </>
                              ) : (
                                <>
                                  <span style={{flex:1,fontSize:13,color:mbr?"rgba(255,255,255,0.88)":"rgba(255,255,255,0.28)",fontStyle:mbr?"normal":"italic"}}>
                                    {mbr||"⏳ Da definire"}
                                  </span>
                                  <button onClick={()=>{setEditMbr({teamId:team.id,idx:i});setMbrVal(mbr||"");}}
                                    style={{padding:"3px 8px",background:"rgba(255,255,255,0.1)",border:"none",borderRadius:5,color:"rgba(255,255,255,0.5)",fontSize:12,cursor:"pointer"}}>✏️</button>
                                  <button onClick={()=>delMbr(team.id,i)}
                                    style={{padding:"3px 7px",background:"rgba(255,70,70,0.2)",border:"none",borderRadius:5,color:"#ff8080",fontSize:13,cursor:"pointer",fontWeight:900}}>×</button>
                                </>
                              )}
                            </div>
                          ))}

                          <button onClick={()=>addMbr(team.id)}
                            style={{marginTop:10,width:"100%",padding:"8px",background:"rgba(255,255,255,0.07)",
                                    border:`1px dashed ${team.color}88`,borderRadius:8,color:team.color,
                                    fontWeight:700,fontSize:12,cursor:"pointer"}}>
                            + Aggiungi giocatore
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* ══ SCOMMESSE ══ */}
            {tab==="scommesse" && (
              <div>

                {/* FAVORITA banner */}
                {(()=>{
                  const top=probs.find(p=>p.prob>0);
                  const tt=top?byId(top.id):null;
                  if(!tt) return (
                    <div style={{...card({padding:"18px",marginBottom:14,textAlign:"center"})}}>
                      <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>Inserisci le quote qui sotto per vedere le probabilità 👇</div>
                    </div>
                  );
                  return (
                    <div style={{...card({padding:"16px",marginBottom:14,borderColor:tt.color,background:"rgba(0,0,0,0.65)",textAlign:"center"})}}>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",letterSpacing:3,textTransform:"uppercase"}}>⭐ Favorita al momento</div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginTop:10}}>
                        <Logo logo={tt.logo} name={tt.name} color={tt.color} size={56}/>
                        <div>
                          <div style={{fontSize:20,fontWeight:900,color:tt.color}}>{tt.name}</div>
                          <div style={{fontSize:32,fontWeight:900,color:"#ffe066",lineHeight:1}}>{top.prob.toFixed(1)}%</div>
                          <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>probabilità di vittoria</div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* QUOTE INPUT + BARS */}
                <div style={{...card({padding:"16px",marginBottom:14})}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#ffe066",marginBottom:4}}>🎲 Quote delle squadre</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:14}}>Inserisci la quota (es. 1.50 · 2.00 · 4.00). Valori più bassi = più favorita.</div>

                  {teams.map(team=>{
                    const p=probs.find(x=>x.id===team.id);
                    const pct=p?p.prob:0;
                    const rank=probs.filter(x=>x.prob>0).findIndex(x=>x.id===team.id);
                    return (
                      <div key={team.id} style={{marginBottom:16}}>
                        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
                          <Logo logo={team.logo} name={team.name} color={team.color} size={28}/>
                          <span style={{flex:1,fontSize:13,fontWeight:700,color:team.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.name}</span>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Quota</span>
                            <NumInput value={odds[team.id]||""} onChange={v=>setOdds(prev=>({...prev,[team.id]:v}))}
                              placeholder="2.00"
                              style={{width:68,fontSize:16,fontWeight:700,padding:"6px 4px",border:`2px solid ${team.color}77`}}/>
                          </div>
                          <span style={{fontSize:14,fontWeight:900,color:pct>0?"#ffe066":"rgba(255,255,255,0.2)",minWidth:48,textAlign:"right"}}>
                            {pct>0?pct.toFixed(1)+"%":"—"}
                          </span>
                        </div>
                        {/* probability bar */}
                        <div style={{height:12,background:"rgba(255,255,255,0.08)",borderRadius:6,overflow:"hidden",position:"relative"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${team.color}99,${team.color})`,borderRadius:6,transition:"width .45s ease",position:"relative"}}>
                            {pct>8&&<span style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:9,fontWeight:800,color:"#fff",whiteSpace:"nowrap"}}>{rank===0?"👑":""}</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* RANKING CARD */}
                {probs.some(p=>p.prob>0)&&(
                  <div style={{...card({padding:"16px"})}}>
                    <div style={{fontSize:13,fontWeight:800,color:"#ffe066",marginBottom:12}}>📊 Ranking Probabilità</div>
                    {probs.map((p,idx)=>{
                      if(p.prob===0) return null;
                      const t=byId(p.id);
                      const medal=idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":`${idx+1}.`;
                      return (
                        <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                          <span style={{fontSize:idx<3?18:13,width:28,textAlign:"center"}}>{medal}</span>
                          <Logo logo={t.logo} name={t.name} color={t.color} size={30}/>
                          <span style={{flex:1,fontSize:13,fontWeight:700,color:t.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                          {odds[p.id]&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)",flexShrink:0}}>quota {parseFloat(odds[p.id]).toFixed(2)}</span>}
                          <span style={{fontSize:17,fontWeight:900,color:"#ffe066",minWidth:54,textAlign:"right"}}>{p.prob.toFixed(1)}%</span>
                        </div>
                      );
                    })}
                    <div style={{marginTop:10,fontSize:11,color:"rgba(255,255,255,0.3)",textAlign:"center"}}>
                      Probabilità normalizzate dalla quota · Si aggiornano in tempo reale
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── RESET ── */}
            <div style={{marginTop:28,textAlign:"center"}}>
              <button onClick={reset} style={{padding:"8px 18px",background:"rgba(255,40,40,0.18)",border:"1px solid rgba(255,80,80,0.38)",borderRadius:20,color:"#ff8080",fontSize:12,cursor:"pointer",fontWeight:700}}>
                🔄 Reset Torneo
              </button>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
