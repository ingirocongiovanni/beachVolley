<style>
  :root {
    --sand:        #ebe2cd;
    --sand-light:  #f3ebd6;
    --sand-mid:    #dccfb1;
    --sand-dark:   #c8b890;

    --water:       #4f7378;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--sand); color: var(--forest); font-family: var(--serif); min-height: 100%; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: 0.45; mix-blend-mode: multiply; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.18 0 0 0 0 0.11 0 0 0 0.16 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  
  [data-lucide], svg.lucide { stroke-width: 1.6; stroke: currentColor; fill: none; display: inline-block; vertical-align: middle; flex-shrink: 0; }
  .icon-xs { width: 12px; height: 12px; } .icon-sm { width: 14px; height: 14px; } .icon-md { width: 18px; height: 18px; } .icon-xl { width: 36px; height: 36px; }

  /* NAV */
  .frame { border-bottom: 1px solid var(--forest); background: var(--sand); position: sticky; top: 0; z-index: 50; }
  .frame-inner { max-width: 1320px; margin: 0 auto; padding: 16px 32px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 32px; }
  .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .brand-icon { color: var(--clay); width: 26px; height: 26px; stroke-width: 1.5; }
  .brand-text { display: flex; flex-direction: column; gap: 1px; }
  .brand-mark { font-family: var(--serif); font-weight: 600; font-size: 22px; color: var(--forest); line-height: 1; text-transform: uppercase; }
  .brand-sub { font-family: var(--mono); font-size: 9px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--forest-faint); }
  .nav { display: flex; gap: 4px; justify-content: center; }
  .nav-link { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--forest-soft); padding: 8px 14px; border-radius: var(--rad-sm); cursor: pointer; background: none; border: 1px solid transparent; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .nav-link:hover { color: var(--forest); background: var(--sand-light); }
  .nav-link.active { color: var(--bone); background: var(--forest); border-color: var(--forest); }
  
  main { max-width: 1320px; margin: 0 auto; padding: 40px 32px 80px; position: relative; z-index: 1; }

  /* BUTTONS & CARDS */
  .btn { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; padding: 10px 18px; border: 1px solid var(--forest); background: var(--sand); color: var(--forest); cursor: pointer; display: inline-flex; align-items: center; gap: 10px; border-radius: var(--rad-sm); transition: 0.2s;}
  .btn:hover { background: var(--forest); color: var(--bone); }
  .btn-primary { background: var(--moss); border-color: var(--moss); color: var(--bone); }
  .btn-primary:hover { background: var(--forest); }
  .btn-danger { border-color: var(--rust); color: var(--rust); background: transparent; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 40px;}
  .card { background: var(--sand); border: 1px solid var(--forest-ghost); cursor: pointer; display: flex; flex-direction: column; border-radius: var(--rad-md); overflow: hidden; transition: 0.2s;}
  .card:hover { background: var(--sand-light); transform: translateY(-2px); box-shadow: var(--shadow-card); }
  .card-cover { aspect-ratio: 16 / 9; background: var(--sand-mid); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--forest-ghost); }
  .card-body { padding: 22px; flex: 1; }
  .card-title { font-family: var(--serif); font-weight: 500; font-size: 24px; color: var(--forest); margin-bottom: 6px; text-transform: uppercase; line-height: 1.1;}

  .field label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--forest-faint); margin-bottom: 6px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .field input, .field textarea { width: 100%; background: var(--bone); border: 1px solid var(--forest-ghost); font-family: var(--serif); font-size: 16px; color: var(--forest); padding: 10px 12px; border-radius: var(--rad-sm); }

  .sub-item-head { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .sub-item-num { font-family: var(--mono); font-size: 11px; color: var(--clay); font-weight: 700; text-transform: uppercase; }

  .sub-item.collapsed .stage-summary { display: inline-block; }
  .sub-item-body { margin-top: 14px; border-top: 1px dashed var(--forest-ghost); padding-top: 14px;}

  /* TYPOGRAPHY DATES */

  .stage-date-large { font-family: var(--serif); font-size: 28px; color: var(--clay); font-style: italic; margin-bottom: 4px; }

  /* MAP */
  .map-wrap { height: 400px; width: 100%; margin-top: 20px; border: 1px solid var(--forest); border-radius: var(--rad-md); z-index: 1; }
  .map-marker { width: 36px; height: 36px; border-radius: 50%; background: var(--forest); color: var(--bone); border: 2px solid var(--bone); display: flex !important; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 600; font-size: 14px; }
  .leaflet-popup-content-wrapper { background: var(--sand); border: 1px solid var(--forest); border-radius: var(--rad-md); }

  /* SHOP */
  .shop-product { display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid var(--forest-ghost); border-radius: var(--rad-md); padding: 24px; background: var(--bone); }
  .shop-img { width: 100%; max-width: 250px; aspect-ratio: 1; object-fit: contain; margin-bottom: 16px; mix-blend-mode: multiply; }
  .shop-title { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--forest); text-transform: uppercase; margin-bottom: 8px; }
  .shop-price { font-family: var(--mono); font-size: 16px; color: var(--clay); margin-bottom: 16px; font-weight: 700; }

  /* MOBILE */
  @media (max-width: 900px) {
    .frame-inner { grid-template-columns: 1fr; gap: 12px; padding: 14px 20px; }
    .nav { justify-content: flex-start; flex-wrap: wrap; }
    main { padding: 20px 16px 80px; }
    .field-row { grid-template-columns: 1fr; }
    .modal { max-width: 95%; margin: 10px; }
  }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--forest); color: var(--bone); padding: 12px 18px; font-family: var(--mono); font-size: 11px; z-index: 200; opacity: 0; transition: all 0.3s; pointer-events: none; border-radius: var(--rad-sm); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<header class="frame">
  <div class="frame-inner">
    <div class="brand" onclick="goto('home')">
      <i data-lucide="paw-print" class="brand-icon"></i>

      <button class="nav-link" data-route="viaggiare"><i data-lucide="route"></i> Viaggiare</button>

<main id="app"></main>

<div class="modal-back" id="modal-back"><div class="modal" id="modal"></div></div>

<script>
// ==========================================
// STATE & STORAGE
// ==========================================
const state = {
  itineraries: JSON.parse(localStorage.getItem('baito_itin')) || [],
  points: JSON.parse(localStorage.getItem('baito_pts')) || [],
  route: { name: 'home', id: null },
  mapInstance: null
};

function saveLocal() {
  localStorage.setItem('baito_itin', JSON.stringify(state.itineraries));
  localStorage.setItem('baito_pts', JSON.stringify(state.points));
}

// ==========================================
// UTILS & MAP
// ==========================================
function showToast(msg) {
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function refreshIcons() { if (window.lucide) window.lucide.createIcons(); }
function goto(name, id = null) { state.route = { name, id }; render(); }
function closeModal() { document.getElementById('modal-back').classList.remove('open'); }

function parseCoords(str) {
  if (!str) return null;
  let s = str.trim();
  // Match per formato Google Maps: "46.1234, 11.5678" oppure "46.1234 11.5678"
  let m = s.match(/^(-?\d+(?:\.\d+)?)\s*[,;\s]+\s*(-?\d+(?:\.\d+)?)$/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  return null;
}

function renderMap(containerId, markers, connect = false) {
  if (state.mapInstance) {
    state.mapInstance.remove();
    state.mapInstance = null;
  }
  const el = document.getElementById(containerId);
  if (!el || markers.length === 0) return;

  const map = L.map(containerId).setView(markers[0].coords, 10);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19, attribution: 'Tiles © Esri'
  }).addTo(map);

  const latLngs = [];
  markers.forEach((m, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="map-marker">${m.label || (i + 1)}</div>`,
      iconSize: [36, 36], iconAnchor: [18, 18]
    });
    const marker = L.marker(m.coords, { icon }).addTo(map);
    if (m.popup) marker.bindPopup(m.popup);
    latLngs.push(m.coords);
  });

  if (connect && latLngs.length > 1) {
    L.polyline(latLngs, { color: '#1f2d1c', weight: 2, dashArray: '6, 6' }).addTo(map);
  }
  if (latLngs.length > 1) map.fitBounds(latLngs, { padding: [40, 40] });
  state.mapInstance = map;
}

// ==========================================
// CALCULATOR & ACCORDION
// ==========================================
function autoCalcItinerary() {
  let totalKm = 0; let totalMin = 0;
  document.querySelectorAll('#stages-list .sub-item').forEach(item => {
    const kmInput = item.querySelector('.stage-distance');
    if(kmInput && kmInput.value) {
      const match = kmInput.value.match(/[\d.,]+/);
      if(match) totalKm += parseFloat(match[0].replace(',', '.'));
    }
    const hrInput = item.querySelector('.stage-hours');
    if(hrInput && hrInput.value) {
      const val = hrInput.value;
      if(val.includes(':')) {
        const parts = val.split(':');
        totalMin += parseInt(parts[0]||0)*60 + parseInt(parts[1]||0);
      } else {
        const match = val.match(/[\d.,]+/);
        if(match) totalMin += parseFloat(match[0].replace(',', '.')) * 60;
      }
    }
  });
  if(totalKm > 0) document.getElementById('itin-distance').value = Math.round(totalKm) + ' km';
  if(totalMin > 0) {
    const h = Math.floor(totalMin / 60);
    const m = Math.round(totalMin % 60);
    document.getElementById('itin-duration').value = `${h}h ${m}m`;
  }
}

function toggleStage(btn) {
  const item = btn.closest('.sub-item');
  item.classList.toggle('collapsed');
  if(item.classList.contains('collapsed')) {
    const from = item.querySelector('.stage-from')?.value || '';
    const to = item.querySelector('.stage-to')?.value || '';
    const name = item.querySelector('.stage-name')?.value || '';
    const summary = item.querySelector('.stage-summary');
    if(from && to) summary.textContent = `${from} ➔ ${to}`;
    else if(name) summary.textContent = name;
    else summary.textContent = "Tappa da compilare";
  }
}

// ==========================================
// RENDERERS (VIEWS)
// ==========================================
function render() {
  const app = document.getElementById('app');
  document.querySelectorAll('.nav-link').forEach(b => {
    b.classList.toggle('active', b.dataset.route === state.route.name);
  });

  switch (state.route.name) {
    case 'home': renderHome(app); break;
    case 'viaggiare': renderViaggiare(app); break;
    case 'itinerary': renderItineraryDetail(app, state.route.id); break;
    case 'point': renderPointDetail(app, state.route.id); break;
    case 'shop': renderShop(app); break;
    default: renderHome(app);
  }
  refreshIcons();
}

function renderHome(root) {
  root.innerHTML = `
    <section style="text-align:center; padding: 40px 0; border-bottom: 1px solid var(--forest-ghost); margin-bottom: 40px;">
      <h1 style="font-size: clamp(40px, 6vw, 70px); font-weight: 500; text-transform:uppercase; margin-bottom: 20px;">Baito dell'Orso</h1>
      <p style="font-size: 18px; color: var(--forest-soft); max-width: 600px; margin: 0 auto;">Itinerari in tenda da tetto, punti salienti e merch. Strade lente, notti sotto un cielo che non si conosce.</p>
    </section>
    <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 40px;">
      <button class="btn btn-primary" onclick="goto('viaggiare')"><i data-lucide="route"></i> Sfoglia Viaggi</button>
      <button class="btn" onclick="goto('shop')"><i data-lucide="shopping-bag"></i> Visita lo Shop</button>
    </div>
  `;
}

function renderViaggiare(root) {
  const itins = state.itineraries || [];
  const pts = state.points || [];

  root.innerHTML = `
    <!-- SEZIONE ITINERARI -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
      <h2 style="font-size: 32px; font-weight:500; text-transform:uppercase;">Itinerari</h2>
      <button class="btn btn-primary" onclick="openItineraryModal()"><i data-lucide="plus"></i> Nuovo Viaggio</button>
    </div>
    ${itins.length === 0 ? '<p style="margin-bottom:40px; color:var(--forest-faint);">Nessun itinerario inserito.</p>' : `
      <div class="grid">
        ${itins.map(it => `
          <div class="card" onclick="goto('itinerary', '${it.id}')">
            <div class="card-cover"><i data-lucide="route" class="icon-xl" style="color:var(--water);"></i></div>
            <div class="card-body">
              <div class="card-title">${it.title || 'Senza Titolo'}</div>
              <div style="font-family:var(--mono); font-size:12px; color:var(--clay);">${it.region || ''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `}

    <!-- SEZIONE PUNTI DI RIFERIMENTO -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 60px; margin-bottom: 24px; border-top: 2px solid var(--forest); padding-top: 20px;">
      <h2 style="font-size: 32px; font-weight:500; text-transform:uppercase;">Punti di Riferimento</h2>
      <button class="btn btn-primary" style="background:var(--clay); border-color:var(--clay);" onclick="openPointModal()"><i data-lucide="plus"></i> Nuovo Punto</button>
    </div>
    ${pts.length === 0 ? '<p style="color:var(--forest-faint);">Nessun punto inserito.</p>' : `
      <div class="grid">
        ${pts.map(p => `
          <div class="card" onclick="goto('point', '${p.id}')">
            <div class="card-cover"><i data-lucide="map-pin" class="icon-xl" style="color:var(--clay);"></i></div>
            <div class="card-body">
              <div class="card-title">${p.title || 'Senza Titolo'}</div>
              <div style="font-family:var(--mono); font-size:12px; color:var(--clay);">${p.region || ''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `}
  `;
}

function renderShop(root) {
  root.innerHTML = `
    <div style="margin-bottom: 40px; text-align:center;">
      <h2 style="font-size: 36px; font-weight:500; text-transform:uppercase; margin-bottom:10px;">Shop del Baito</h2>
      <p style="color:var(--forest-soft);">Supporta il progetto. Magliette e felpe per chi ama il wild.</p>
    </div>
    <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
      <div class="shop-product">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=400&q=80" alt="T-Shirt" class="shop-img" style="border-radius:10px;">
        <div class="shop-title">T-Shirt "Into the Wild"</div>
        <div class="shop-price">€ 24.90</div>
        <button class="btn btn-primary" onclick="showToast('Shop in allestimento! Presto disponibile.')"><i data-lucide="shopping-cart"></i> Pre-ordina</button>
      </div>
      <div class="shop-product">
        <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=400&q=80" alt="Felpa" class="shop-img" style="border-radius:10px;">
        <div class="shop-title">Felpa "Baito dell'Orso"</div>
        <div class="shop-price">€ 49.90</div>
        <button class="btn btn-primary" onclick="showToast('Shop in allestimento! Presto disponibile.')"><i data-lucide="shopping-cart"></i> Pre-ordina</button>
      </div>
    </div>

// ==========================================
// EDITOR ITINERARIO (MODAL)
// ==========================================
function openItineraryModal(id = null) {
  const it = id ? state.itineraries.find(x => x.id === id) : { id: Date.now().toString(), title: '', region: '', distance: '', duration: '', stops: [] };
  
  const stopsHtml = it.stops.map((s, i) => `
    <div class="sub-item collapsed" data-id="${s.id}">
      <div class="sub-item-head" onclick="toggleStage(this)">
        <div>
          <i data-lucide="chevron-down" class="icon-xs collapse-icon"></i>
          <span class="sub-item-num">Tappa ${i+1}</span>
          <span class="stage-summary">${s.fromPlace ? s.fromPlace + ' ➔ ' + s.toPlace : 'Tappa'}</span>
        </div>
        <button type="button" class="btn btn-danger btn-sm" onclick="event.stopPropagation(); this.closest('.sub-item').remove(); autoCalcItinerary();"><i data-lucide="trash-2"></i></button>
      </div>
      <div class="sub-item-body">
        <div class="field-row">
          <div class="field"><label>Data Specifica</label><input type="date" class="stage-date" value="${s.date || ''}"></div>
          <div class="field"><label>Coordinate (es. 46.12, 11.45)</label><input type="text" class="stage-coords" value="${s.coords || ''}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Da</label><input type="text" class="stage-from" value="${s.fromPlace || ''}" oninput="this.closest('.sub-item').querySelector('.stage-summary').textContent = this.value + ' ➔ ' + this.closest('.sub-item').querySelector('.stage-to').value"></div>
          <div class="field"><label>A</label><input type="text" class="stage-to" value="${s.toPlace || ''}" oninput="this.closest('.sub-item').querySelector('.stage-summary').textContent = this.closest('.sub-item').querySelector('.stage-from').value + ' ➔ ' + this.value"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Km</label><input type="text" class="stage-distance" value="${s.distance || ''}" oninput="autoCalcItinerary()"></div>
          <div class="field"><label>Ore</label><input type="text" class="stage-hours" value="${s.hours || ''}" oninput="autoCalcItinerary()"></div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <div>${id ? 'Modifica' : 'Nuovo'} Viaggio</div>
      <button class="btn" style="padding:4px 8px;" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body" id="itin-form-body">
      <div class="field-row">
        <div class="field"><label>Titolo</label><input type="text" id="itin-title" value="${it.title || ''}"></div>
        <div class="field"><label>Regione</label><input type="text" id="itin-region" value="${it.region || ''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Distanza Totale</label><input type="text" id="itin-distance" value="${it.distance || ''}"></div>
        <div class="field"><label>Ore Totali</label><input type="text" id="itin-duration" value="${it.duration || ''}"></div>
      </div>
      <div style="margin-top: 30px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--forest); padding-bottom:10px; margin-bottom:10px;">
        <label style="font-family:var(--serif); font-size:18px;">Tappe del Viaggio</label>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('itin-form-body').scrollTo({top: 9999, behavior: 'smooth'})"><i data-lucide="arrow-down"></i> Scorri giù</button>
      </div>
      <div id="stages-list">${stopsHtml}</div>
      <button class="btn" style="width:100%; margin-top:10px; border:1px dashed var(--forest);" onclick="addSimpleStage()"><i data-lucide="plus"></i> Aggiungi Tappa</button>
    </div>
    <div class="modal-foot">
      ${id ? `<button class="btn btn-danger" onclick="deleteItin('${id}')"><i data-lucide="trash-2"></i> Elimina</button>` : '<div></div>'}
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
        <button class="btn btn-primary" onclick="saveItin('${it.id}')"><i data-lucide="check"></i> Salva</button>
      </div>
    </div>
  `;
  document.getElementById('modal-back').classList.add('open');
  refreshIcons();
}

function addSimpleStage() {
  const list = document.getElementById('stages-list');
  const count = list.querySelectorAll('.sub-item').length + 1;
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="sub-item" data-id="${Date.now()}">
      <div class="sub-item-head" onclick="toggleStage(this)">
        <div><i data-lucide="chevron-down" class="icon-xs collapse-icon"></i> <span class="sub-item-num">Tappa ${count}</span> <span class="stage-summary">Nuova tappa</span></div>
        <button type="button" class="btn btn-danger btn-sm" onclick="event.stopPropagation(); this.closest('.sub-item').remove(); autoCalcItinerary();"><i data-lucide="trash-2"></i></button>
      </div>
      <div class="sub-item-body">
        <div class="field-row">
          <div class="field"><label>Data</label><input type="date" class="stage-date"></div>
          <div class="field"><label>Coordinate (es. 46.12, 11.45)</label><input type="text" class="stage-coords"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Da</label><input type="text" class="stage-from" oninput="this.closest('.sub-item').querySelector('.stage-summary').textContent = this.value + ' ➔ ' + this.closest('.sub-item').querySelector('.stage-to').value"></div>
          <div class="field"><label>A</label><input type="text" class="stage-to" oninput="this.closest('.sub-item').querySelector('.stage-summary').textContent = this.closest('.sub-item').querySelector('.stage-from').value + ' ➔ ' + this.value"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Km</label><input type="text" class="stage-distance" oninput="autoCalcItinerary()"></div>
          <div class="field"><label>Ore</label><input type="text" class="stage-hours" oninput="autoCalcItinerary()"></div>
        </div>
      </div>
    </div>
  `;
  list.appendChild(div.firstElementChild);
  refreshIcons();
  document.getElementById('itin-form-body').scrollTo({top: 9999, behavior: 'smooth'});
}

function saveItin(id) {
  const title = document.getElementById('itin-title').value;
  if(!title) { alert('Inserisci un titolo'); return; }
  
  const stops = Array.from(document.querySelectorAll('#stages-list .sub-item')).map((el, index) => ({
    id: el.dataset.id, day: index + 1,
    date: el.querySelector('.stage-date').value,
    coords: el.querySelector('.stage-coords').value,
    fromPlace: el.querySelector('.stage-from').value,
    toPlace: el.querySelector('.stage-to').value,
    distance: el.querySelector('.stage-distance').value,
    hours: el.querySelector('.stage-hours').value
  }));

  const it = {
    id, title,
    region: document.getElementById('itin-region').value,
    distance: document.getElementById('itin-distance').value,
    duration: document.getElementById('itin-duration').value,
    stops
  };

  const existingIdx = state.itineraries.findIndex(x => x.id === id);
  if(existingIdx >= 0) state.itineraries[existingIdx] = it; else state.itineraries.unshift(it);
  
  saveLocal();
  closeModal();
  showToast('Itinerario Salvato!');
  render();
}

function deleteItin(id) {
  if(!confirm('Vuoi eliminare questo itinerario?')) return;
  state.itineraries = state.itineraries.filter(x => x.id !== id);
  saveLocal();
  closeModal();
  goto('viaggiare');
}

function renderItineraryDetail(root, id) {
  const it = state.itineraries.find(x => x.id === id);
  if(!it) return;
  
  root.innerHTML = `
    <button class="btn btn-ghost" style="margin-bottom:20px;" onclick="goto('viaggiare')"><i data-lucide="arrow-left"></i> Viaggiare</button>
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h1 style="font-size:40px; font-weight:500; text-transform:uppercase;">${it.title}</h1>
      <button class="btn btn-primary" onclick="openItineraryModal('${it.id}')"><i data-lucide="pencil"></i> Modifica</button>
    </div>
    
    <div style="display:flex; gap: 20px; margin-bottom:30px; font-family:var(--mono); color:var(--clay);">
      <span><i data-lucide="map-pin"></i> ${it.region || '—'}</span>
      <span><i data-lucide="ruler"></i> ${it.distance || '0 km'}</span>
      <span><i data-lucide="clock"></i> ${it.duration || '0 h'}</span>
    </div>

    <div id="map-itin" class="map-wrap"></div>

    <div style="margin-top:40px;">
      ${it.stops.map(s => {
        let dateHtml = '';
        if (s.date) {
           const d = new Date(s.date);
           dateHtml = `<div class="stage-date-large">${d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' })}</div><div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;">Tappa ${s.day}</div>`;
        } else {
           dateHtml = `<div class="stage-num-large">${String(s.day).padStart(2,'0')}</div><div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;">Giorno ${s.day}</div>`;
        }
        return `
        <div style="display:grid; grid-template-columns: 100px 1fr; gap:20px; padding: 20px 0; border-bottom:1px solid var(--forest-ghost);">
          <div>${dateHtml}</div>
          <div>
            <div style="font-size:22px; font-weight:500; text-transform:uppercase; margin-bottom:10px;">${s.fromPlace} ➔ ${s.toPlace}</div>
            <div style="display:flex; gap:15px; font-family:var(--mono); font-size:12px; color:var(--forest-soft);">
              ${s.distance ? `<span>Km: ${s.distance}</span>` : ''}
              ${s.hours ? `<span>Ore: ${s.hours}</span>` : ''}
              ${s.coords ? `<span>Coord: ${s.coords}</span>` : ''}
            </div>
          </div>
        </div>
      `}).join('')}
    </div>
  `;

  // Render Map dopo che il DOM è caricato
  setTimeout(() => {
    const validMarkers = it.stops.map((s, idx) => {
      const coords = parseCoords(s.coords);
      if(!coords) return null;
      return { coords, label: String(idx+1), popup: `<b>Tappa ${idx+1}</b><br>${s.fromPlace} ➔ ${s.toPlace}` };
    }).filter(x => x);
    renderMap('map-itin', validMarkers, true);
  }, 100);
}

// ==========================================
// EDITOR PUNTI (MODAL)
// ==========================================
function openPointModal(id = null) {
  const p = id ? state.points.find(x => x.id === id) : { id: Date.now().toString(), title: '', region: '', coords: '', description: '' };
  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <div>${id ? 'Modifica' : 'Nuovo'} Punto</div>
      <button class="btn" style="padding:4px 8px;" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>Nome / Titolo</label><input type="text" id="pt-title" value="${p.title || ''}"></div>
        <div class="field"><label>Regione</label><input type="text" id="pt-region" value="${p.region || ''}"></div>
      </div>
      <div class="field"><label>Coordinate (es. 46.12, 11.45)</label><input type="text" id="pt-coords" value="${p.coords || ''}"></div>
      <div class="field"><label>Descrizione / Note</label><textarea id="pt-desc">${p.description || ''}</textarea></div>
    </div>
    <div class="modal-foot">
      ${id ? `<button class="btn btn-danger" onclick="deletePoint('${id}')"><i data-lucide="trash-2"></i> Elimina</button>` : '<div></div>'}
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
        <button class="btn btn-primary" onclick="savePoint('${p.id}')"><i data-lucide="check"></i> Salva</button>
      </div>
    </div>
  `;
  document.getElementById('modal-back').classList.add('open');
  refreshIcons();
}

function savePoint(id) {
  const title = document.getElementById('pt-title').value;
  if(!title) { alert('Inserisci un titolo'); return; }
  
  const pt = {
    id, title,
    region: document.getElementById('pt-region').value,
    coords: document.getElementById('pt-coords').value,
    description: document.getElementById('pt-desc').value
  };

  const existingIdx = state.points.findIndex(x => x.id === id);
  if(existingIdx >= 0) state.points[existingIdx] = pt; else state.points.unshift(pt);
  
  saveLocal();
  closeModal();
  showToast('Punto Salvato!');
  render();
}

function deletePoint(id) {
  if(!confirm('Vuoi eliminare questo punto?')) return;
  state.points = state.points.filter(x => x.id !== id);
  saveLocal();
  closeModal();
  goto('viaggiare');
}

function renderPointDetail(root, id) {
  const p = state.points.find(x => x.id === id);
  if(!p) return;
  
  root.innerHTML = `
    <button class="btn btn-ghost" style="margin-bottom:20px;" onclick="goto('viaggiare')"><i data-lucide="arrow-left"></i> Viaggiare</button>
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h1 style="font-size:40px; font-weight:500; text-transform:uppercase;">${p.title}</h1>
      <button class="btn btn-primary" onclick="openPointModal('${p.id}')"><i data-lucide="pencil"></i> Modifica</button>
    </div>
    <div style="font-family:var(--mono); color:var(--clay); margin-bottom:30px;">
      <i data-lucide="map-pin"></i> ${p.region || '—'}
    </div>
    <div style="font-size: 18px; line-height: 1.6; color: var(--forest-soft); margin-bottom: 40px;">
      ${p.description ? p.description.replace(/\n/g, '<br>') : 'Nessuna nota presente.'}
    </div>
    <div id="map-pt" class="map-wrap"></div>
  `;

  setTimeout(() => {
    const coords = parseCoords(p.coords);
    if(coords) renderMap('map-pt', [{ coords, label: '★', popup: `<b>${p.title}</b>` }]);
  }, 100);
}

window.onload = () => { render(); };

Object.assign(window, {
  goto, closeModal, toggleStage, autoCalcItinerary,
  openItineraryModal, saveItin, deleteItin, addSimpleStage,
  openPointModal, savePoint, deletePoint, showToast
});
</script>

</body></html>
